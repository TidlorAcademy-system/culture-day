<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NTL Culture Day 2026 Register</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body,
    input,
    button {
      font-family: "Noto Sans Thai", Arial, Tahoma, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: #fff;
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 93, 255, 0.65), transparent 28%),
        radial-gradient(circle at 85% 35%, rgba(255, 21, 56, 0.7), transparent 30%),
        linear-gradient(135deg, #02030a 0%, #08122d 45%, #05030a 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          115deg,
          transparent 0px,
          transparent 26px,
          rgba(255, 255, 255, 0.04) 27px,
          rgba(255, 255, 255, 0.04) 28px
        );
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px 16px;
    }

    .box {
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 1.5px;
      box-shadow: 0 0 24px rgba(0, 183, 255, 0.45);
    }

    h1 {
      margin: 18px 0 8px;
      font-size: 40px;
      line-height: 0.95;
      font-weight: 900;
      text-transform: uppercase;
      text-shadow:
        4px 4px 0 #00185c,
        0 0 30px rgba(255, 21, 56, 0.85);
    }

    .highlight {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 16px 10px;
      background: linear-gradient(135deg, #ff1538, #b60017);
      border: 3px solid #ff9a00;
      transform: skewX(-8deg);
      box-shadow: 0 0 32px rgba(255, 21, 56, 0.95);
    }

    .subtitle {
      margin: 14px 0 22px;
      color: rgba(255, 255, 255, 0.85);
      font-size: 16px;
      line-height: 1.55;
    }

    .card {
      position: relative;
      overflow: hidden;
      padding: 24px;
      border-radius: 30px;
      background: rgba(4, 10, 28, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.55),
        0 0 34px rgba(0, 93, 255, 0.36);
      backdrop-filter: blur(14px);
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: -40%;
      width: 80%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #00b7ff, #ff1538, transparent);
      animation: move 2.6s linear infinite;
    }

    @keyframes move {
      from { left: -40%; }
      to { left: 100%; }
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 26px;
      font-weight: 900;
    }

    .card p {
      margin: 0 0 20px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 14px;
      line-height: 1.6;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 900;
    }

    .count {
      color: #ffd200;
    }

    input {
      width: 100%;
      height: 64px;
      border-radius: 20px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      outline: none;
      background: rgba(255, 255, 255, 0.96);
      color: #06112b;
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    input:focus {
      border-color: #00b7ff;
      box-shadow: 0 0 0 4px rgba(0, 183, 255, 0.18);
    }

    button {
      width: 100%;
      height: 62px;
      margin-top: 18px;
      border: 0;
      border-radius: 20px;
      cursor: pointer;
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      background: linear-gradient(135deg, #ff1538, #ff4b00 48%, #ffba00);
      box-shadow: 0 12px 28px rgba(255, 21, 56, 0.38);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .msg {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 18px;
      font-size: 20px;
      line-height: 1.5;
      text-align: left;
    }

    .error {
      background: rgba(255, 21, 56, 0.18);
      border: 1px solid rgba(255, 21, 56, 0.55);
    }

    .success {
      background: rgb(0 255 36 / 14%);
      border: 1px solid rgb(0 255 31 / 50%);
    }

    .ticket {
      display: none;
      margin-top: 16px;
      padding: 16px;
      border-radius: 20px;
      border: 1px dashed rgba(255, 255, 255, 0.4);
      text-align: left;
      font-size: 20px;
    }

    .ticket strong {
      color: #ffd200;
    }

    .nav {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .nav a {
      color: #fff;
      text-decoration: none;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.16);
      font-size: 13px;
      font-weight: 800;
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="box">
      <div class="badge">USER REGISTER</div>

      <h1>
        NTL CULTURE<br>
        <span class="highlight">DAY 2026</span>
      </h1>

      <div class="subtitle">
        เข้าสู่สนามกิจกรรม Culture Day<br>
        กรอกรหัสพนักงานเพื่อเข้าร่วมงาน
      </div>

      <div class="card">
        <h2>ลงทะเบียนเข้าร่วมงาน</h2>
        <p>
          กรอกรหัสพนักงาน 8 อักขระเท่านั้น<br>
          ขึ้นต้นด้วย CF1, CF2, CF3, 800, 101, 110, 111, 112 หรือ 113
        </p>

        <form id="form">
          <div class="label-row">
            <label>รหัสพนักงาน</label>
            <span class="count"><span id="count">0</span>/8</span>
          </div>

          <input
            id="empId"
            type="text"
            inputmode="text"
            maxlength="8"
            placeholder="CF100001"
            autocomplete="off"
            autocapitalize="characters"
          />

          <button id="btn" type="submit" disabled>
            START REGISTER
          </button>
        </form>

        <div id="errorBox" class="msg error"></div>
        <div id="successBox" class="msg success"></div>

        <div id="ticket" class="ticket">
          <strong>REGISTER CONFIRMED</strong><br>
          Employee ID: <span id="showEmpId">-</span><br>
          Register Time: <span id="showTime">-</span><br>
          Referral: <span id="showReferral">-</span>
        </div>
      </div>
    </section>
  </main>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzKrf43i_0owWSfNZqns-STAkTf7QHa25-CtgrShLAHex8RPaU95xxHQwhCWSSi21QuaQ/exec';

    const form = document.getElementById('form');
    const empIdInput = document.getElementById('empId');
    const btn = document.getElementById('btn');
    const count = document.getElementById('count');

    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');
    const ticket = document.getElementById('ticket');

    const showEmpId = document.getElementById('showEmpId');
    const showTime = document.getElementById('showTime');
    const showReferral = document.getElementById('showReferral');

    const EMP_ID_PATTERN = /^(CF[123]|800|101|110|111|112|113)[0-9]{5}$/;
    const EMP_ID_ERROR = 'รหัสพนักงานต้องมี 8 อักขระ และขึ้นต้นด้วย CF1, CF2, CF3, 800, 101, 110, 111, 112 หรือ 113 เท่านั้นค่ะ';

    const MAX_RETRIES = 3;

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function cleanEmpId(value) {
      return String(value || '')
        .toUpperCase()
        .replace(/[^A-Z0-9]/g, '')
        .slice(0, 8);
    }

    function isValidEmpId(empId) {
      return EMP_ID_PATTERN.test(empId);
    }

    function getReferral() {
      const params = new URLSearchParams(window.location.search);
      return params.get('ref') ||
             params.get('referral') ||
             params.get('refferal') ||
             '';
    }

    function hideMessage() {
      errorBox.style.display = 'none';
      successBox.style.display = 'none';
      ticket.style.display = 'none';
      errorBox.textContent = '';
      successBox.textContent = '';
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = 'block';
      successBox.style.display = 'none';
      ticket.style.display = 'none';
    }

    function showSuccess(data) {
      successBox.textContent = data.message || 'ลงทะเบียนสำเร็จค่ะ';
      successBox.style.display = 'block';
      errorBox.style.display = 'none';

      showEmpId.textContent = data.empId || '-';
      showTime.textContent = data.timestamp || '-';
      showReferral.textContent = data.referral || '-';

      ticket.style.display = 'block';
    }

    async function postToAppsScript(payload) {
      let lastError = null;

      for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
        try {
          const response = await fetch(APPS_SCRIPT_URL + '?t=' + Date.now(), {
            method: 'POST',
            headers: {
              'Content-Type': 'text/plain;charset=utf-8'
            },
            body: JSON.stringify(payload),
            redirect: 'follow',
            cache: 'no-store'
          });

          const text = await response.text();

          let result;
          try {
            result = JSON.parse(text);
          } catch (err) {
            throw new Error('Apps Script ไม่ได้ตอบกลับเป็น JSON กรุณาตรวจสอบ Deployment URL หรือสิทธิ์ Anyone');
          }

          if (result.ok || !result.retryable || attempt === MAX_RETRIES) {
            return result;
          }

          await sleep(attempt * 2000);

        } catch (err) {
          lastError = err;

          if (attempt === MAX_RETRIES) {
            throw err;
          }

          await sleep(attempt * 2000);
        }
      }

      throw lastError || new Error('เชื่อมต่อระบบไม่สำเร็จ');
    }

    empIdInput.addEventListener('input', () => {
      hideMessage();

      const value = cleanEmpId(empIdInput.value);
      empIdInput.value = value;

      count.textContent = value.length;
      btn.disabled = value.length !== 8;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage();

      const empId = cleanEmpId(empIdInput.value);
      const referral = getReferral();

      if (!empId) {
        showError('กรุณากรอกรหัสพนักงานก่อนค่ะ หากไม่กรอก ระบบจะไม่แสดงข้อมูลและไม่บันทึกข้อมูล');
        return;
      }

      if (empId.length !== 8) {
        showError('รหัสพนักงานต้องมี 8 อักขระเท่านั้นค่ะ');
        return;
      }

      if (!isValidEmpId(empId)) {
        showError(EMP_ID_ERROR);
        return;
      }

      btn.disabled = true;
      btn.textContent = 'กำลังบันทึก...';

      try {
        const result = await postToAppsScript({
          action: 'register',
          empId,
          referral
        });

        if (result.ok) {
          showSuccess(result);
          empIdInput.value = '';
          count.textContent = '0';
        } else {
          showError(result.message || 'ไม่สามารถบันทึกข้อมูลได้ค่ะ');
        }

      } catch (err) {
        showError('เกิดข้อผิดพลาดค่ะ: ' + err.message);
      }

      btn.textContent = 'START REGISTER';
      btn.disabled = empIdInput.value.length !== 8;
    });
  </script>
</body>
</html>
